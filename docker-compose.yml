services:
  api:
    build:
      context: .
      dockerfile: .github/workflows/Dockerfile.api
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - ASPNETCORE_URLS=https://+:8443;http://+:8080
      - ConnectionStrings__Default=Data Source=/data/lifealert.db
      - Urls__ApiBaseUrl=https://localhost:8443
      - Urls__ClientBaseUrl=http://localhost:8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=2hr4tyfy2296A
    volumes:
      - lifealert-data:/data
      - ./certs:/https:ro
  client:
    build:
      context: .
      dockerfile: .github/workflows/Dockerfile.client
    ports:
      - "8081:8081"
    depends_on:
      - api

volumes:
  lifealert-data:
