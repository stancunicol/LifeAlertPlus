<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Alert +</title>
    <base href="/" />
    <link href="LifeAlertPlus.Client.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/themes.css" />
    
    <!-- Favicon pentru toate browserele -->
    <link rel="icon" type="image/svg+xml" href="logo_rounded.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="logo_rounded.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="logo_rounded.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="logo_rounded.png" />
    
    <!-- Theme color pentru mobile -->
    <meta name="theme-color" content="#ff69b4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="#ff69b4" />
    <meta name="application-name" content="LifeAlert +" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="logo_rounded.png" />
    <meta name="application-version" content="1.5.2" />
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-content">
                <img src="logo_rounded.png" alt="Life Alert Plus" class="loading-logo" />
                <h1 class="loading-title">Life Alert +</h1>
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An error has occurred. <a href="" class="reload">Refresh</a>
        <a class="dismiss">✕</a>
    </div>
    <script src="js/profile.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/chartTooltip.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // expose simple getter for the app version (read from meta)
        window.getAppVersion = function () {
            try {
                var m = document.querySelector('meta[name="application-version"]');
                return m ? m.getAttribute('content') : null;
            } catch (e) { return null; }
        };

        // register service worker (if supported)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('service-worker.js').then(function (reg) {
                    console.log('Service worker registered.', reg);
                }).catch(function (err) {
                    console.log('Service worker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
