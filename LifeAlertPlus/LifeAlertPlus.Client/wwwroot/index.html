<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Alert +</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jua&family=Inter:wght@400;500;600&display=swap" />
    <base href="/" />
    <link href="LifeAlertPlus.Client.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    
    <!-- Favicon pentru toate browserele -->
    <link rel="icon" type="image/svg+xml" href="logo_final.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="logo_final.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="logo_final.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="logo_final.png" />
    
    <!-- Theme color pentru mobile -->
    <meta name="theme-color" content="#A5D6A7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="#A5D6A7" />
    <meta name="application-name" content="LifeAlert +" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="logo_final.png" />
    <meta name="application-version" content="1.5.2" />
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-content">
                <img src="logo_final.png" alt="Life Alert Plus" class="loading-logo" />
                <h1 class="loading-title">Life Alert +</h1>
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An error has occurred. <a href="" class="reload">Refresh</a>
        <a class="dismiss">✕</a>
    </div>
    <script src="js/profile.js" defer></script>
    <script src="js/chartTooltip.js" defer></script>
    <script src="js/pdfExport.js" defer></script>
    <!-- Google Maps is initialized from Blazor after auth: JSRuntime.InvokeVoidAsync("initGoogleMaps", apiKey) -->
    <script>
        (function () {
            var _mapsLoaded = false;
            window.initGoogleMaps = function (key) {
                if (_mapsLoaded || !key) return;
                _mapsLoaded = true;
                var s = document.createElement('script');
                s.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(key) + '&loading=async';
                s.async = true; s.defer = true;
                document.head.appendChild(s);
            };
        })();
    </script>
    <script src="js/googleMapsInterop.js" defer></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // expose simple getter for the app version (read from meta)
        window.getAppVersion = function () {
            try {
                var m = document.querySelector('meta[name="application-version"]');
                return m ? m.getAttribute('content') : null;
            } catch (e) { return null; }
        };

        // language persistence helpers
        window.getLanguage = function () {
            try { return localStorage.getItem('appLang'); } catch (e) { return null; }
        };
        window.setLanguage = function (lang) {
            try { localStorage.setItem('appLang', lang); } catch (e) { }
        };

        // register service worker (if supported)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('service-worker.js').then(function (reg) {
                    console.log('Service worker registered.', reg);
                }).catch(function (err) {
                    console.log('Service worker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
