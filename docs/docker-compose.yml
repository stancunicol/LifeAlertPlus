services:
  ai-service:
    build:
      context: ..
      dockerfile: ai-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  api:
    build:
      context: ..
      dockerfile: .github/workflows/Dockerfile.api
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=https://+:8443;http://+:8080
      - ConnectionStrings__Default=Data Source=/data/lifealert.db
      - Urls__ApiBaseUrl=https://localhost:8443
      - Urls__ClientBaseUrl=http://localhost:8081
      - Urls__AiServiceUrl=http://ai-service:8000
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=2hr4tyfy2296A
    volumes:
      - lifealert-data:/data
      - ./certs:/https:ro
    restart: unless-stopped
    depends_on:
      ai-service:
        condition: service_healthy

  client:
    build:
      context: ..
      dockerfile: .github/workflows/Dockerfile.client
      args:
        # Development → appsettings.json (ApiBaseUrl: https://localhost:8443)
        # so the browser-side WASM app connects to the local Docker API.
        BLAZOR_ENV: Development
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      - api

volumes:
  lifealert-data:
