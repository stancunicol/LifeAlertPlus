name: Deploy AI Service to Azure Container Instances

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CCB4448BF0CD45859D73CB664A9AC4D5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6641CA3C8C84418B96932A6DC45DB23A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9285ADF2D81E4588B58C973974B6ABF1 }}

      - name: Deploy AI container to Azure Container Instances
        run: |
          az container create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name lifealertplus-ai \
            --image stancunicol/lifealertplus:ai-latest \
            --ports 8000 \
            --cpu 1 \
            --memory 1.5 \
            --dns-name-label lifealertplus-ai \
            --location germanywestcentral \
            --registry-login-server docker.io \
            --registry-username "${{ secrets.DOCKER_USERNAME }}" \
            --registry-password "${{ secrets.DOCKER_TOKEN }}" \
            --os-type Linux \
            --restart-policy Always

      - name: Show AI service URL
        run: |
          FQDN=$(az container show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name lifealertplus-ai \
            --query "ipAddress.fqdn" -o tsv)
          echo "AI Service URL: http://${FQDN}:8000"
          echo ""
          echo "Set this in Azure App Settings (API App Service):"
          echo "  Name:  Urls__AiServiceUrl"
          echo "  Value: http://${FQDN}:8000"
