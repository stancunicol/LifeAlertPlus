name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag vars
        shell: bash
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/Dockerfile.api
          push: true
          tags: |
            stancunicol/lifealertplus-api:latest
            stancunicol/lifealertplus-api:${{ env.SHORT_SHA }}
            stancunicol/lifealertplus-api:${{ env.VERSION }}

      - name: Build and push Client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/Dockerfile.client
          push: true
          tags: |
            stancunicol/lifealertplus-client:latest
            stancunicol/lifealertplus-client:${{ env.SHORT_SHA }}
            stancunicol/lifealertplus-client:${{ env.VERSION }}
