name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/Dockerfile.api
          push: true
          tags: |
            stancunicol/lifealertplus:api-latest
            stancunicol/lifealertplus:api-${{ steps.version.outputs.version }}

      - name: Build and push Client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/Dockerfile.client
          push: true
          tags: |
            stancunicol/lifealertplus:client-latest
            stancunicol/lifealertplus:client-${{ steps.version.outputs.version }}

      - name: Build and push AI service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ai-service/Dockerfile
          push: true
          tags: |
            stancunicol/lifealertplus:ai-latest
            stancunicol/lifealertplus:ai-${{ steps.version.outputs.version }}
