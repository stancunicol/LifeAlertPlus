# Construiește și publică pe Docker Hub câte o imagine Docker pentru fiecare din cele 3 componente
# (API .NET, Client Blazor, microserviciu AI Python) — rulează DUPĂ ce version.yml a actualizat fișierul VERSION,
# folosind acea versiune ca tag de imagine (alături de un tag "latest" mereu actualizat).
name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Workaround pentru action-uri JS care necesită Node 24 explicit pe runner-ul implicit

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Workflow-ul doar citește codul, nu are nevoie să scrie înapoi în repo (diferit de version.yml)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Citește versiunea curentă din fișierul VERSION (scris de version.yml la commit-ul precedent)
      # — folosită ca tag Docker, ca imaginile să fie urmăribile la o versiune exactă a aplicației
      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      # Autentificare pe Docker Hub cu credențiale din secretele repo-ului (nu hardcodate)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Imaginea API: build din Dockerfile.api, cu contextul setat la rădăcina repo-ului (.)
      # ca Dockerfile-ul să poată copia fișiere din afara folderului .github/workflows
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/Dockerfile.api
          push: true
          tags: |
            stancunicol/lifealertplus:api-latest
            stancunicol/lifealertplus:api-${{ steps.version.outputs.version }}

      # Imaginea Client: build din Dockerfile.client — folosită probabil pentru auto-hosting alternativ la Azure Web App
      - name: Build and push Client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/Dockerfile.client
          push: true
          tags: |
            stancunicol/lifealertplus:client-latest
            stancunicol/lifealertplus:client-${{ steps.version.outputs.version }}

      # Imaginea microserviciului AI: Dockerfile-ul e în ai-service/, nu în .github/workflows (proiect Python separat)
      - name: Build and push AI service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ai-service/Dockerfile
          push: true
          tags: |
            stancunicol/lifealertplus:ai-latest
            stancunicol/lifealertplus:ai-${{ steps.version.outputs.version }}
