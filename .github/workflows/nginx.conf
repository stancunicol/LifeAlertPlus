# Configurație Nginx pentru servirea aplicației Blazor WASM ca SPA (Single Page Application).
server {
    listen 8081;       # Trebuie să corespundă cu EXPOSE 8081 din Dockerfile.client
    server_name _;      # "_" = wildcard, acceptă orice hostname/domeniu (nu e nevoie de un nume fix aici)

    root /usr/share/nginx/html;   # Fișierele publicate Blazor (index.html, _framework/, css/) au fost copiate aici în Dockerfile.client

    location / {
        # Esențial pentru SPA cu routing pe client (Blazor Router): Nginx încearcă mai întâi fișierul cerut ($uri),
        # apoi un folder cu acel nume ($uri/), iar dacă niciunul nu există (ex: /dashboard, /profile — rute Blazor,
        # nu fișiere reale pe disc), servește index.html. Altfel, accesarea directă a unei rute Blazor (refresh
        # de pagină sau link direct) ar întoarce 404 de la Nginx, pentru că acel "fișier" nu există fizic.
        try_files $uri $uri/ /index.html;
    }
}
