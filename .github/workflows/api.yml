name: Deploy API to Azure

on:
  push:
    branches: [ main ]
    paths:
      - 'LifeAlertPlus/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore LifeAlertPlus/LifeAlertPlus.sln

      - name: Run tests
        run: dotnet test LifeAlertPlus/LifeAlertPlus.Tests/LifeAlertPlus.Tests.csproj --no-restore --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Publish API
        run: dotnet publish LifeAlertPlus/LifeAlertPlus.API/LifeAlertPlus.API.csproj --no-restore -c Release -o publish

      - name: Deploy to Azure Web App (API)
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_NAME_API }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish
