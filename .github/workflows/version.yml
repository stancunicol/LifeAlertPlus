name: Auto Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit message
        id: msg
        run: |
          msg="$(git log -1 --pretty=format:%B)"
          msg="${msg//$'\n'/ }"
          echo "message=$msg" >> $GITHUB_OUTPUT


      - name: Determine bump type
        id: bump
        run: |
          msg="$(echo "${{ steps.msg.outputs.message }}" | tr '[:upper:]' '[:lower:]')"

          if echo "$msg" | grep -q "breaking change" || echo "$msg" | grep -q "!:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$msg" | grep -q "^feat"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$msg" | grep -q "^fix"; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "No version bump"
            exit 0
          fi

      - name: Read current version
        id: current
        run: |
          if [ -f VERSION ]; then
            v=$(cat VERSION)
          else
            v="1.0.0"
          fi
          echo "version=$v" >> $GITHUB_OUTPUT

      - name: Bump version
        id: new
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"

          case "${{ steps.bump.outputs.type }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac

          echo "version=$major.$minor.$patch" >> $GITHUB_OUTPUT

      - name: Write files
        run: |
          echo "${{ steps.new.outputs.version }}" > VERSION

          if [ -f LifeAlertPlus/LifeAlertPlus.Client/src/assets/version.json ]; then
            echo "{\"version\":\"${{ steps.new.outputs.version }}\"}" \
              > LifeAlertPlus/LifeAlertPlus.Client/src/assets/version.json
            git add LifeAlertPlus/LifeAlertPlus.Client/src/assets/version.json
          fi

          git add VERSION

      - name: Commit & tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "chore(version): bump to ${{ steps.new.outputs.version }}"
          git tag v${{ steps.new.outputs.version }}
          git push
          git push --tags
